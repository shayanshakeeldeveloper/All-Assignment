<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Counter</title>
</head>
<body>
    <h1 id="marks">50</h1>
    <button id="add">Add Bonus Marks</button>
    <button id="deduct">Deduct Marks</button>
</body>
<script>
    let marksH1 = document.querySelector("#marks")
    let addBtn = document.querySelector("#add")
    let deductBtn = document.querySelector("#deduct")

    let marks = Number(marksH1.innerHTML) 

    let increment = () => {
        marks += 5             
        marksH1.innerHTML = marks
    }
    let decrement = () => {
        marks -= 5             
        marksH1.innerHTML = marks
    }
    addBtn.addEventListener("click", increment)
    deductBtn.addEventListener("click", decrement)
</script>
</html>
