<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If & Else Operators Assignment</title>
</head>
<body>
    <h1>If & Else Operators</h1>
</body>
<script>
    // Mixed Challenge 1:
    let obtainedMarks = 72
    let passingMarks = 40
    let attendance = 85
    let requiredAttendance = 75
    // 1
    console.log(obtainedMarks > passingMarks)
    // 2
    console.log(attendance > requiredAttendance)
    // 3
    console.log(obtainedMarks > passingMarks && attendance > requiredAttendance)
    // 4
    console.log(obtainedMarks > 70 || attendance > 90)
    // 5
    console.log(attendance > requiredAttendance)
    // 6
    console.log(obtainedMarks === passingMarks)

    // Mixed Challenge 2:
    let cartTotal = 5500
    let minimumOrder = 3000
    let walletBalance = 4000
    let premiumMember = true
    // 1
    console.log(cartTotal > minimumOrder)
    // 2
    console.log(walletBalance > cartTotal)
    // 3
    console.log(cartTotal > minimumOrder && walletBalance > cartTotal)
    // 4
    console.log(premiumMember || cartTotal > 5000)
    // 5
    console.log(walletBalance > cartTotal)
    // 6
    console.log(premiumMember === true)

    // Mixed Challenge 3:
    let playerLevel = 18
    let requiredLevel = 15
    let coins = 1800
    let requiredCoins = 2000
    let premiumPass = true
    // 1
    console.log(playerLevel > requiredLevel)
    // 2
    console.log(coins > requiredCoins)
    // 3
    console.log(playerLevel > requiredLevel && coins > requiredCoins)
    // 4
    console.log(premiumPass || playerLevel > 20)
    // 5
    console.log(requiredCoins > coins)
    // 6
    console.log(premiumPass !== false)

    // Mixed Challenge 4:
    let accountBalance = 50000
    let withdrawalAmount = 15000
    let pinVerified = true
    let dailyLimit = 20000
    // 1
    console.log(withdrawalAmount < dailyLimit)
    // 2
    console.log(accountBalance > withdrawalAmount)
    // 3
    console.log(pinVerified && accountBalance > withdrawalAmount)
    // 4
    console.log(accountBalance > 100000 || pinVerified)
    // 5
    console.log(withdrawalAmount < dailyLimit)
    // 6
    console.log(pinVerified === true)

    // Mixed Challenge 5:
    let age = 19
    let minimumAge = 18
    let registeredParticipants = 480
    let maximumParticipants = 500
    let vipInvite = false
    // 1
    console.log(age > minimumAge)
    // 2
    console.log(registeredParticipants < maximumParticipants)
    // 3
    console.log(age > minimumAge && registeredParticipants < maximumParticipants)
    // 4
    console.log(vipInvite || age > 25)
    // 5
    console.log(registeredParticipants < maximumParticipants)
    // 6
    console.log(vipInvite !== true)

    // Mixed Challenge 6:
    let experience = 3
    let requiredExperience = 2
    let degreeCompleted = true
    let referralAvailable = false
    // 1
    console.log(experience > requiredExperience)
    // 2
    console.log(degreeCompleted)
    // 3
    console.log(experience > requiredExperience && degreeCompleted)
    // 4
    console.log(degreeCompleted || referralAvailable)
    // 5
    console.log(experience > requiredExperience)
    // 6
    console.log(referralAvailable === true)

    // Mixed Challenge 7:
    let testScore = 82
    let requiredScore = 75
    let documentsSubmitted = true
    let sportsQuota = false
    // 1
    console.log(testScore > requiredScore)
    // 2
    console.log(documentsSubmitted)
    // 3
    console.log(testScore > requiredScore && documentsSubmitted)
    // 4
    console.log(sportsQuota || testScore > 90)
    // 5
    console.log(testScore > requiredScore)
    // 6
    console.log(sportsQuota === false)
</script>
</html>
